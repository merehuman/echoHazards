services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: echo_hazards
      POSTGRES_USER: tp_user
      POSTGRES_PASSWORD: tp_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tp_user -d echo_hazards"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tp_user:tp_password@db:5432/echo_hazards
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
